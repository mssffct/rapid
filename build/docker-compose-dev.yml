services:
  broker:
    container_name: broker
    build:
      context: ../
      dockerfile: ./build/Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DOCKERIZED: 1
    ports:
      - "8014:8014"
    volumes:
      - broker-logs:/app/logs
      - ../server/app:/app/app
    networks:
      - db
      - redis

  db:
    container_name: db
    image: postgres:17.6
    env_file:
      - .env-dev
    #    expose:
    #      - ${POSTGRES_PORT}
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    restart: always
    volumes:
      - db-volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -p ${POSTGRES_PORT} -h ${POSTGRES_HOST} -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: -p ${POSTGRES_PORT}
    networks:
      - db

  redis:
    image: redis:7.4-alpine
    container_name: redis
    mem_limit: 512m
    expose:
      - ${REDIS_PORT}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_USER=${REDIS_USER}
      - REDIS_USER_PASSWORD=${REDIS_USER_PASSWORD}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: >
      sh -c '
        mkdir -p /usr/local/etc/redis &&
        echo "bind 0.0.0.0" > /usr/local/etc/redis/redis.conf &&
        echo "requirepass $REDIS_PASSWORD" >> /usr/local/etc/redis/redis.conf &&
        echo "appendonly yes" >> /usr/local/etc/redis/redis.conf &&
        echo "appendfsync everysec" >> /usr/local/etc/redis/redis.conf &&
        echo "user default on nopass ~* +@all" > /usr/local/etc/redis/users.acl &&
        echo "user $REDIS_USER on >$REDIS_USER_PASSWORD ~* +@all" >> /usr/local/etc/redis/users.acl &&
        redis-server /usr/local/etc/redis/redis.conf --aclfile /usr/local/etc/redis/users.acl
      '
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    tty: true
    stdin_open: true
    volumes:
      - redis-volume:/data
    networks:
      - redis


volumes:
  dev-vol:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: "../server/app"
  broker-logs:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: /usr/rapid/logs
  db-volume:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: /usr/rapid/postgres
  redis-volume:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: /usr/rapid/redis


networks:
  db:
    driver: bridge
  redis:
    driver: bridge
